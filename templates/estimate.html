[[extend 'layout.html']]

<style>
.vars { padding: 5px 20px; text-align: center; }
.vars th:after { content: ": " }
.vars th, .vars td, .vars li { padding: 2px 5px; }
</style>

<div class="section">
  <div class="vars">
    <ul>
      <li>[[=T("Task: %s") % task.name]]</li>
      <li>[[=T("Time remaining (hours) for this round: %f") % (remaining_window.total_seconds()/3600)]]</li>
    </ul>
    <div>[[=form]]</div>
  </div>
</div>
